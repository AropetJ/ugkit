# Publishes @ugkit/locale to npm with provenance attestation.
#
# INERT until we decide to publish: it only runs on manual dispatch and
# requires the NPM_TOKEN secret (granular automation token) to be set in
# the repo settings. Provenance links the published tarball to this exact
# commit + workflow run — a supply-chain trust feature for a package that
# will live inside KYC and fintech forms.

name: Publish

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Workspace package to publish"
        required: true
        default: "@ugkit/locale"

permissions:
  contents: read
  id-token: write # required for --provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: npm
      - run: npm ci
      # prepublishOnly runs build + test + validate:data automatically
      - run: npm publish --workspace=${{ inputs.package }} --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
