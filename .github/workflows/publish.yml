# Publishes @ugkit/locale to npm with provenance attestation.
#
# INERT until we decide to publish: it only runs on manual dispatch and
# requires the NPM_TOKEN secret (granular automation token) to be set in
# the repo settings. Provenance links the published tarball to this exact
# commit + workflow run — a supply-chain trust feature for a package that
# will live inside KYC and fintech forms.
#
# TODO after the first publish: configure npm "trusted publishing" (OIDC)
# for the package on npmjs.com, then delete the NPM_TOKEN secret and the
# NODE_AUTH_TOKEN env below — tokenless publishes with automatic provenance.

name: Publish

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Workspace package to publish"
        required: true
        type: choice
        options:
          - "@ugkit/locale"

permissions:
  contents: read
  id-token: write # required for --provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: npm
      - run: npm ci
      # prepublishOnly runs build + test + validate:data automatically
      - run: npm publish --workspace="$PKG" --access public --provenance
        env:
          PKG: ${{ inputs.package }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
